<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Recetas</title>
</head>
<body>
  <h1>Recetas de Cocina</h1>
  <!-- Enlace al formulario ajustado a la ruta web -->
  <a th:href="@{/web/recetas/nuevo}">Crear Receta</a>
  <table>
    <tr><th>Nombre</th><th>Categoría</th><th>Dieta</th><th>Calorías</th></tr>
    <tr th:each="receta : ${recetas}">
      <td th:text="${receta.nombre}"></td>
      <td th:text="${receta.categoria}"></td>
      <td th:text="${receta.dieta}"></td>
      <td th:text="${receta.getCaloriasTotales()}"></td>
    </tr>
  </table>
</body>
</html>
